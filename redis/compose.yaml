version: '3.8'

services:
    redis:
        image: redis:alpine
        container_name: redis
        restart: unless-stopped
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    redis-insight:
        image: redis/redisinsight:latest
        container_name: redis-insight
        restart: unless-stopped
        ports:
            - 5540:5540
        volumes:
            - redis-insight-data:/data
        depends_on:
            - redis

volumes:
    redis-data:
    redis-insight-data:
